<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 40px;
        background: #050505;
        color: #f5f1e8;
        font-family: 'Archivo', sans-serif;
      }
      .sec-head {
        display: flex;
        align-items: baseline;
        gap: 28px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding-bottom: 24px;
      }
      .num {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        color: #c6ff00;
        letter-spacing: 0.28em;
      }
      .t {
        font-family: 'Archivo Black', sans-serif;
        font-size: clamp(40px, 5vw, 64px);
        line-height: 0.92;
        letter-spacing: -0.035em;
        text-transform: uppercase;
        flex: 1;
      }
      .t .fire {
        color: #ff3b0f;
      }
      .t .acid {
        color: #c6ff00;
      }
      .meta {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: #6b7280;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-align: right;
      }
      .cap {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.22em;
        color: #6b7280;
        text-transform: uppercase;
        margin-top: 18px;
      }
      .cap b {
        color: #c6ff00;
      }
    </style>
  </head>
  <body>
    <div class="sec-head">
      <div class="num">// 01_FRAMEWORK</div>
      <h2 class="t">
        SEIS <span class="acid">PERGUNTAS.</span> UMA <span class="fire">ORDEM.</span> ZERO
        IMPROVISO.
      </h2>
      <div class="meta">MODULE.6PS<br />STATUS: ACTIVE</div>
    </div>
    <div class="cap">
      // SECTION HEAD · <b>KICKER MONO ACID</b> · H2 ARCHIVO BLACK · META DIREITA MONO
    </div>
  </body>
</html>
