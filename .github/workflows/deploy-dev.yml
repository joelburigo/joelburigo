name: Deploy dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://dev.joelburigo.com.br
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # opennextjs-cloudflare deploy faz: build OpenNext + populate R2 cache + wrangler deploy.
      # cf:deploy:dev (do package.json) usa --env dev → wrangler.jsonc[env.dev].
      - name: Build + Deploy (Cloudflare Workers env=dev)
        run: pnpm cf:deploy:dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE: ${{ secrets.DATABASE_URL_DEV }}
          PUBLIC_SITE_URL: https://dev.joelburigo.com.br
          NODE_ENV: production
