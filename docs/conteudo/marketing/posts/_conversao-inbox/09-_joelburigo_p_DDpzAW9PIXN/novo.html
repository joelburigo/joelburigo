<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>JB · Manifesto IG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --jb-ink: #050505;
        --jb-cream: #f5f1e8;
        --jb-fire: #ff3b0f;
        --jb-acid: #c6ff00;
        --jb-fg-muted: #6b7280;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--jb-ink); }
      .canvas {
        width: 1080px; height: 1080px;
        position: relative; overflow: hidden;
        background: var(--jb-ink); color: var(--jb-cream);
      }
      .grid-bg {
        position: absolute; inset: 0; pointer-events: none; z-index: 0; opacity: 0.35;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 80px 80px;
      }
      .pad {
        position: relative; z-index: 2;
        padding: 80px; height: 100%;
        display: flex; flex-direction: column; justify-content: space-between;
      }
      .sb {
        display: flex; justify-content: space-between; align-items: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px; letter-spacing: 0.25em; text-transform: uppercase;
        color: var(--jb-fg-muted);
      }
      .sb .dot {
        width: 12px; height: 12px; background: var(--jb-acid); border-radius: 50%;
        box-shadow: 0 0 14px var(--jb-acid);
        display: inline-block; margin-right: 12px; vertical-align: middle;
      }
      .sb b { color: var(--jb-cream); }
      .aspas {
        font-family: 'Archivo Black', sans-serif;
        font-size: 220px; line-height: 0.7;
        color: var(--jb-fire); letter-spacing: -0.1em;
        margin-bottom: -10px;
      }
      .quote {
        font-family: 'Archivo Black', sans-serif;
        font-size: 108px; line-height: 0.96;
        letter-spacing: -0.04em; text-transform: uppercase;
        color: var(--jb-cream);
      }
      .quote .stroke { -webkit-text-stroke: 3px var(--jb-cream); color: transparent; }
      .quote .fire { color: var(--jb-fire); }
      .quote .acid { color: var(--jb-acid); }
      .attr {
        font-family: 'JetBrains Mono', monospace;
        font-size: 22px; letter-spacing: 0.25em;
        color: var(--jb-fg-muted); text-transform: uppercase;
        display: flex; align-items: center; gap: 20px;
      }
      .attr::before { content: ''; width: 80px; height: 1px; background: var(--jb-acid); }
    </style>
  </head>
  <body data-w="1080" data-h="1080">
    <div class="canvas">
      <div class="grid-bg"></div>
      <div class="pad">
        <div class="sb">
          <span><span class="dot"></span>MANIFESTO · ED. 06</span>
          <span>// <b>@joelburigo</b></span>
        </div>

        <div>
          <div class="aspas">"</div>
          <div class="quote">
            META SEM<br />
            <span class="acid">SISTEMA</span><br />
            É <span class="fire">DESEJO</span><br />
            COM PRAZO.
          </div>
        </div>

        <div class="attr">JOEL BURIGO · SISTEMA &gt; IMPROVISO</div>
      </div>
    </div>
  </body>
</html>
