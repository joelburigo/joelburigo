<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 28px;
        background: #050505;
        color: #f5f1e8;
        font-family: 'Archivo', sans-serif;
        display: flex;
        gap: 14px;
        align-items: flex-start;
        flex-wrap: wrap;
        min-height: 360px;
      }
      .lab {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: #6b7280;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        display: block;
        margin-bottom: 6px;
      }
      .i {
        background: #0b0b0b;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #f5f1e8;
        padding: 11px 14px;
        font-family: 'Archivo', sans-serif;
        font-size: 13px;
        border-radius: 0;
        outline: none;
        min-width: 240px;
        box-sizing: border-box;
      }
      .i:focus {
        border-color: #c6ff00;
        box-shadow: 0 0 0 2px rgba(198, 255, 0, 0.25);
      }
      .i.fire-focus {
        border-color: #ff3b0f;
        box-shadow: 0 0 0 2px rgba(255, 59, 15, 0.25);
      }

      .dd {
        position: relative;
        min-width: 260px;
      }
      .dd-trigger {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        background: #0b0b0b;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #f5f1e8;
        padding: 11px 14px;
        font-family: 'Archivo', sans-serif;
        font-size: 13px;
        cursor: pointer;
        border-radius: 0;
        user-select: none;
      }
      .dd.open .dd-trigger {
        border-color: #c6ff00;
        box-shadow: 0 0 0 2px rgba(198, 255, 0, 0.25);
      }
      .dd-chev {
        color: #c6ff00;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        transition: transform 160ms;
      }
      .dd.open .dd-chev {
        transform: rotate(180deg);
      }
      .dd-panel {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: #0b0b0b;
        border: 1px solid #c6ff00;
        border-radius: 0;
        padding: 4px 0;
        box-shadow: 6px 6px 0 rgba(198, 255, 0, 0.25);
        z-index: 20;
        display: none;
      }
      .dd.open .dd-panel {
        display: block;
      }
      .dd-head {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.25em;
        color: #c6ff00;
        text-transform: uppercase;
        padding: 10px 14px 8px;
        border-bottom: 1px solid rgba(198, 255, 0, 0.2);
      }
      .dd-opt {
        padding: 10px 14px;
        font-family: 'Archivo', sans-serif;
        font-size: 13px;
        color: #f5f1e8;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-left: 3px solid transparent;
      }
      .dd-opt:hover {
        background: rgba(198, 255, 0, 0.08);
        border-left-color: #c6ff00;
        color: #c6ff00;
      }
      .dd-opt.sel {
        background: #c6ff00;
        color: #050505;
        border-left-color: #050505;
      }
      .dd-opt .tg {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.15em;
        opacity: 0.5;
      }
      .dd-opt.sel .tg {
        opacity: 0.7;
        color: #050505;
      }
    </style>
  </head>
  <body>
    <div><span class="lab">// E-MAIL</span><input class="i" placeholder="tu@empresa.com.br" /></div>
    <div>
      <span class="lab">// WHATSAPP (FOCUS FIRE)</span
      ><input class="i fire-focus" value="(47) 9 9999-9999" />
    </div>
    <div>
      <span class="lab">// FATURAMENTO / MÊS</span>
      <div class="dd open" id="dd">
        <div class="dd-trigger" onclick="document.getElementById('dd').classList.toggle('open')">
          <span id="dd-val">R$ 200k – 500k/mês</span>
          <span class="dd-chev">▼</span>
        </div>
        <div class="dd-panel">
          <div class="dd-head">// Selecione a faixa</div>
          <div class="dd-opt" onclick="pick(this)">
            <span>Até R$ 50k/mês</span><span class="tg">01</span>
          </div>
          <div class="dd-opt" onclick="pick(this)">
            <span>R$ 50k – 200k/mês</span><span class="tg">02</span>
          </div>
          <div class="dd-opt sel" onclick="pick(this)">
            <span>R$ 200k – 500k/mês</span><span class="tg">03</span>
          </div>
          <div class="dd-opt" onclick="pick(this)">
            <span>R$ 500k – 1M/mês</span><span class="tg">04</span>
          </div>
          <div class="dd-opt" onclick="pick(this)">
            <span>R$ 1M+/mês</span><span class="tg">05</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      function pick(el) {
        const panel = el.parentElement;
        [...panel.querySelectorAll('.dd-opt')].forEach((o) => o.classList.remove('sel'));
        el.classList.add('sel');
        document.getElementById('dd-val').textContent = el.firstElementChild.textContent;
        document.getElementById('dd').classList.remove('open');
      }
      document.addEventListener('click', (e) => {
        const dd = document.getElementById('dd');
        if (!dd.contains(e.target)) dd.classList.remove('open');
      });
    </script>
  </body>
</html>
