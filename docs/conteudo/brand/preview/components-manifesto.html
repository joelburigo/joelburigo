<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:0;background:#050505;color:#F5F1E8;font-family:'Archivo',sans-serif}
 .manif{padding:80px 40px;border-top:1px solid rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.08);position:relative;overflow:hidden}
 .manif::before{content:'SISTEMA > IMPROVISO';position:absolute;bottom:-60px;left:-40px;font-family:'Archivo Black',sans-serif;font-size:240px;color:rgba(255,59,15,0.06);letter-spacing:-0.05em;white-space:nowrap;line-height:1}
 .q{font-family:'Archivo Black',sans-serif;font-size:clamp(40px,5vw,72px);line-height:1;letter-spacing:-0.035em;text-transform:uppercase;max-width:1000px;position:relative}
 .q .fire{color:#FF3B0F}
 .q .acid{color:#C6FF00}
 .q .stroke{-webkit-text-stroke:2px #F5F1E8;color:transparent}
 .attr{margin-top:32px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#6B7280;letter-spacing:0.25em;text-transform:uppercase;display:flex;align-items:center;gap:14px;position:relative}
 .attr::before{content:'';width:64px;height:1px;background:#C6FF00}
</style></head><body>
<div class="manif">
  <div class="q">
    "SE TUA <span class="stroke">EMPRESA</span> DEPENDE DE <span class="fire">TU,</span> TU NÃO TEM EMPRESA. TU TEM <span class="acid">EMPREGO.</span>"
  </div>
  <div class="attr">JOEL BURIGO · FRAMEWORK 6PS · 17 ANOS</div>
</div>
</body></html>
