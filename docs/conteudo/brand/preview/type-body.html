<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:24px;background:#050505;color:#F5F1E8;font-family:'Archivo',sans-serif}
 .row{display:flex;flex-direction:column;gap:18px}
 .line{display:flex;align-items:baseline;gap:20px}
 .lab{font-family:'JetBrains Mono',monospace;font-size:10px;color:#C6FF00;letter-spacing:0.25em;text-transform:uppercase;min-width:160px}
 .h3{font-family:'Archivo Black',sans-serif;font-size:40px;line-height:0.95;letter-spacing:-0.035em;text-transform:uppercase}
 .body{font-size:17px;line-height:1.55;max-width:460px;color:#E5E5E5}
 .body b{color:#F5F1E8;font-weight:600}
 .hl{background:linear-gradient(90deg,rgba(198,255,0,0.18),transparent);padding:2px 6px;border-left:2px solid #C6FF00}
 .micro{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:#6B7280}
</style></head><body>
<div class="row">
  <div class="line"><span class="lab">// H3 · ARCHIVO BLACK 40</span><span class="h3">Framework 6Ps</span></div>
  <div class="line"><span class="lab">// BODY · ARCHIVO 17/1.55</span><span class="body">Framework dos <b>6Ps</b> — a <span class="hl">engine</span> que tirou <b>140+ MPEs</b> do achismo e plugou em previsibilidade.</span></div>
  <div class="line"><span class="lab">// MICRO · MONO</span><span class="micro">// EST. 2008 · CRICIÚMA/SC · 140+ MPES</span></div>
</div>
</body></html>
