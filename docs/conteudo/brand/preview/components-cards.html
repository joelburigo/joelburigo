<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:28px;background:#050505;color:#F5F1E8;font-family:'Archivo',sans-serif;display:flex;gap:20px;flex-wrap:wrap}
 .card{background:#0B0B0B;border:1px solid rgba(255,255,255,0.08);padding:28px 24px;width:280px;border-radius:0;position:relative;display:flex;flex-direction:column;transition:all 180ms}
 .card:hover{border-color:#FF3B0F;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #FF3B0F}
 .card.feat{border-color:#C6FF00;background:linear-gradient(180deg,rgba(198,255,0,0.06),#0B0B0B)}
 .card.feat:hover{box-shadow:6px 6px 0 #C6FF00}
 .tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.25em;color:#6B7280;text-transform:uppercase}
 .card.feat .tag{color:#C6FF00}
 .num{font-family:'Archivo Black',sans-serif;font-size:54px;color:#FF3B0F;line-height:0.9;letter-spacing:-0.03em;margin-top:10px}
 .card.feat .num{color:#C6FF00}
 .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#FF3B0F;letter-spacing:0.28em;text-transform:uppercase;margin-top:6px}
 .card.feat .lbl{color:#C6FF00}
 .t{font-family:'Archivo Black',sans-serif;font-size:20px;letter-spacing:-0.02em;text-transform:uppercase;margin-top:10px;color:#F5F1E8}
 .d{color:#9A9A9A;font-size:13px;line-height:1.55;margin-top:10px}
</style></head><body>
<div class="card">
  <div class="tag">// MÓDULO 03</div>
  <div class="num">P3</div>
  <div class="lbl">// PRODUTO</div>
  <div class="t">O quê?</div>
  <div class="d">Oferta, pricing, pacote. Escrito, versionado, testado — não no feeling.</div>
</div>
<div class="card feat">
  <div class="tag">// CASE · LOGÍSTICA</div>
  <div class="num">+142%</div>
  <div class="lbl">// TICKET MÉDIO</div>
  <div class="t">Distribuidora NE</div>
  <div class="d">9 meses com playbook + ritual semanal. Time triplicou receita sem contratar.</div>
</div>
</body></html>
