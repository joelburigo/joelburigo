<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: #050505;
        color: #f5f1e8;
        font-family: 'Archivo', sans-serif;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: flex-start;
      }
      .eye-acid {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #c6ff00;
        border: 1px solid rgba(198, 255, 0, 0.3);
        padding: 7px 14px;
      }
      .eye-acid .dot {
        width: 6px;
        height: 6px;
        background: #c6ff00;
        border-radius: 50%;
        box-shadow: 0 0 8px #c6ff00;
        animation: pulse 1.6s infinite;
      }
      .eye-fire {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #ff3b0f;
        border: 1px solid rgba(255, 59, 15, 0.35);
        padding: 7px 14px;
      }
      .eye-fire .dot {
        width: 6px;
        height: 6px;
        background: #ff3b0f;
        border-radius: 50%;
      }
      @keyframes pulse {
        50% {
          opacity: 0.3;
        }
      }
      .cap {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.22em;
        color: #6b7280;
        text-transform: uppercase;
      }
      .cap b {
        color: #c6ff00;
      }
    </style>
  </head>
  <body>
    <div class="eye-acid"><span class="dot"></span> DIAGNÓSTICO AO VIVO · 10 MIN · GRÁTIS</div>
    <div class="cap">// EYEBROW ACID · <b>GROWTH / LIVE / CTA GROWTH</b></div>

    <div class="eye-fire"><span class="dot"></span> ALERTA · URGÊNCIA · PROMO</div>
    <div class="cap">// EYEBROW FIRE · <b>URGÊNCIA / ALERTA</b></div>
  </body>
</html>
