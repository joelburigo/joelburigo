<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:28px;background:#050505;color:#F5F1E8;font-family:'Archivo',sans-serif;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
 .chip{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px;border-radius:9999px;letter-spacing:0.18em;text-transform:uppercase;font-weight:600}
 .fire{background:rgba(255,59,15,0.12);border:1px solid rgba(255,59,15,0.35);color:#FF3B0F}
 .acid{background:rgba(198,255,0,0.10);border:1px solid rgba(198,255,0,0.35);color:#C6FF00}
 .solid-fire{background:#FF3B0F;color:#050505}
 .solid-acid{background:#C6FF00;color:#050505}
 .ghost{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#6B7280}
 .num{background:#050505;border:1px solid #FF3B0F;color:#FF3B0F;font-family:'Archivo Black',sans-serif;letter-spacing:0;font-size:14px;padding:4px 10px;border-radius:2px}
 .num.a{border-color:#C6FF00;color:#C6FF00}
 .dot{width:6px;height:6px;background:#C6FF00;border-radius:50%;box-shadow:0 0 8px #C6FF00;animation:pulse 1.6s infinite}
 @keyframes pulse{50%{opacity:0.3}}
</style></head><body>
<span class="chip fire">★ 17+ ANOS</span>
<span class="chip acid"><span class="dot"></span> AO VIVO</span>
<span class="chip solid-fire">★ URGÊNCIA</span>
<span class="chip solid-acid">★ MAIS PEDIDO</span>
<span class="chip ghost">// EXP. 2004</span>
<span class="num">P1</span><span class="num a">P4</span><span class="num">P6</span>
<span class="chip fire">NOVO EPISÓDIO</span>
</body></html>
