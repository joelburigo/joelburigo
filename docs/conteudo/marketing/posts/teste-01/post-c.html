<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Teste 01 — Post C (Híbrido bg nano-banana + texto HTML)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../brand/colors_and_type.css" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #000; }
      .post {
        width: 1080px; height: 1080px;
        position: relative; overflow: hidden;
        background: #050505 url('bg-c.jpg') center/cover no-repeat;
        color: var(--jb-cream);
      }
      .veil {
        position: absolute; inset: 0; z-index: 1;
        background: linear-gradient(180deg, rgba(5,5,5,0.55) 0%, rgba(5,5,5,0.85) 60%, rgba(5,5,5,0.95) 100%);
      }
      .pad {
        position: relative; z-index: 2;
        padding: 80px; height: 100%;
        display: flex; flex-direction: column; justify-content: space-between;
      }
      .sb {
        display: flex; justify-content: space-between; align-items: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px; letter-spacing: 0.25em; text-transform: uppercase;
        color: var(--jb-fg-muted);
      }
      .sb .dot {
        width: 12px; height: 12px; background: var(--jb-acid); border-radius: 50%;
        box-shadow: 0 0 14px var(--jb-acid);
        display: inline-block; margin-right: 12px; vertical-align: middle;
      }
      .sb b { color: var(--jb-cream); }
      .aspas {
        font-family: 'Archivo Black', sans-serif;
        font-size: 360px; line-height: 0.6;
        color: var(--jb-fire); letter-spacing: -0.1em;
        margin-bottom: -40px;
      }
      .quote {
        font-family: 'Archivo Black', sans-serif;
        font-size: 130px; line-height: 0.95;
        letter-spacing: -0.04em; text-transform: uppercase;
        color: var(--jb-cream);
      }
      .quote .stroke {
        -webkit-text-stroke: 3px var(--jb-cream);
        color: transparent;
      }
      .quote .fire { color: var(--jb-fire); }
      .attr {
        font-family: 'JetBrains Mono', monospace;
        font-size: 22px; letter-spacing: 0.25em;
        color: var(--jb-fg-muted); text-transform: uppercase;
        display: flex; align-items: center; gap: 20px;
      }
      .attr::before { content: ''; width: 80px; height: 1px; background: var(--jb-acid); }
    </style>
  </head>
  <body>
    <div class="post">
      <div class="veil"></div>
      <div class="pad">
        <div class="sb">
          <span><span class="dot"></span>MANIFESTO · ED. 03</span>
          <span>// <b>@joelburigo</b></span>
        </div>
        <div>
          <div class="aspas">"</div>
          <div class="quote">
            <span class="stroke">POST BONITO</span><br />
            NO INSTAGRAM<br />
            NÃO PAGA<br />
            <span class="fire">BOLETO.</span>
          </div>
        </div>
        <div class="attr">JOEL BURIGO · SISTEMA &gt; IMPROVISO</div>
      </div>
    </div>
  </body>
</html>
