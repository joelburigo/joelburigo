# ============================================================================
# Snippet pra MERGAR em /mnt/data/docker-compose.yml (growth-infra).
#
# Substitui o serviço `joelburigo-site` atual (Astro) pela versão Next.js
# e adiciona:
#   - joelburigo-worker  (pg-boss consumer, mesma imagem)
#   - pg-joelburigo-site (Postgres 16 isolado em db-back, seguindo padrão pg-housecredi-painel)
#
# Secrets vão em /mnt/data/.env (gerado pelo 1Password CLI via generate-env.sh).
# ============================================================================

services:
  joelburigo-site:
    image: ghcr.io/joelburigo/joelburigo-site:latest
    container_name: joelburigo-site
    restart: unless-stopped
    networks: [web, db-front]
    environment:
      NODE_ENV: production
      PORT: 4321
      DATABASE_URL: postgres://joelburigo:${JOELBURIGO_SITE_DB_PASSWORD}@pgbouncer:6432/joelburigo
      PUBLIC_SITE_URL: https://joelburigo.com.br
      # Analytics (migrados do Astro)
      PUBLIC_GTM_ID: ${JOELBURIGO_GTM_ID:-}
      PUBLIC_META_PIXEL_ID: ${JOELBURIGO_META_PIXEL_ID:-}
      GA4_MEASUREMENT_ID: ${JOELBURIGO_GA4_MEASUREMENT_ID:-}
      GA4_API_SECRET: ${JOELBURIGO_GA4_API_SECRET:-}
      META_CAPI_ACCESS_TOKEN: ${JOELBURIGO_META_CAPI_ACCESS_TOKEN:-}
      # LLM
      LLM_PROVIDER: ${JOELBURIGO_LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL_CHAT: ${JOELBURIGO_LLM_MODEL_CHAT:-gpt-5.2}
      LLM_MODEL_PREMIUM: ${JOELBURIGO_LLM_MODEL_PREMIUM:-gpt-5.2}
      LLM_MODEL_IMAGE: ${JOELBURIGO_LLM_MODEL_IMAGE:-gpt-image-2}
      # Pagamentos
      MP_ACCESS_TOKEN: ${JOELBURIGO_MP_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${JOELBURIGO_MP_PUBLIC_KEY}
      MP_WEBHOOK_SECRET: ${JOELBURIGO_MP_WEBHOOK_SECRET}
      STRIPE_SECRET_KEY: ${JOELBURIGO_STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${JOELBURIGO_STRIPE_WEBHOOK_SECRET:-}
      # Cloudflare
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID}
      CF_API_TOKEN: ${JOELBURIGO_CF_API_TOKEN}
      CF_STREAM_CUSTOMER_CODE: ${JOELBURIGO_CF_STREAM_CUSTOMER_CODE:-}
      R2_BUCKET: joelburigo-artifacts
      R2_PUBLIC_URL: ${JOELBURIGO_R2_PUBLIC_URL}
      R2_ACCESS_KEY_ID: ${JOELBURIGO_R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${JOELBURIGO_R2_SECRET_ACCESS_KEY}
      TURNSTILE_SITE_KEY: ${JOELBURIGO_TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${JOELBURIGO_TURNSTILE_SECRET_KEY:-}
      # Email
      BREVO_API_KEY: ${JOELBURIGO_BREVO_API_KEY}
      EMAIL_FROM_TRANSACTIONAL: nao-responda@joelburigo.com.br
      EMAIL_FROM_PERSONAL: joel@joelburigo.com.br
      # n8n
      N8N_WEBHOOK_URL: ${JOELBURIGO_N8N_WEBHOOK_URL:-}
      # Sessão
      JWT_SECRET: ${JOELBURIGO_JWT_SECRET}
      # Sentry (quando ativar)
      SENTRY_DSN: ${JOELBURIGO_SENTRY_DSN:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.joelburigo-site.rule=Host(`joelburigo.com.br`) || Host(`www.joelburigo.com.br`)"
      - "traefik.http.routers.joelburigo-site.entrypoints=websecure"
      - "traefik.http.routers.joelburigo-site.tls.certresolver=cloudflare"
      - "traefik.http.services.joelburigo-site.loadbalancer.server.port=4321"
      # redirect www → apex
      - "traefik.http.middlewares.joelburigo-www-redirect.redirectregex.regex=^https://www\\.joelburigo\\.com\\.br/(.*)"
      - "traefik.http.middlewares.joelburigo-www-redirect.redirectregex.replacement=https://joelburigo.com.br/$${1}"
      - "traefik.http.routers.joelburigo-site.middlewares=joelburigo-www-redirect"
      # Watchtower
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - pg-joelburigo-site
      - pgbouncer

  joelburigo-worker:
    image: ghcr.io/joelburigo/joelburigo-site:latest
    container_name: joelburigo-worker
    restart: unless-stopped
    networks: [db-front]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://joelburigo:${JOELBURIGO_SITE_DB_PASSWORD}@pgbouncer:6432/joelburigo
      LLM_PROVIDER: ${JOELBURIGO_LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MP_ACCESS_TOKEN: ${JOELBURIGO_MP_ACCESS_TOKEN}
      BREVO_API_KEY: ${JOELBURIGO_BREVO_API_KEY}
      EMAIL_FROM_TRANSACTIONAL: nao-responda@joelburigo.com.br
      EMAIL_FROM_PERSONAL: joel@joelburigo.com.br
      R2_BUCKET: joelburigo-artifacts
      R2_ACCESS_KEY_ID: ${JOELBURIGO_R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${JOELBURIGO_R2_SECRET_ACCESS_KEY}
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID}
      N8N_WEBHOOK_URL: ${JOELBURIGO_N8N_WEBHOOK_URL:-}
    command: ["node", "--import", "tsx/esm", "worker-src/runner.ts"]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - pg-joelburigo-site
      - pgbouncer

  pg-joelburigo-site:
    image: pgvector/pgvector:pg16
    container_name: pg-joelburigo-site
    restart: unless-stopped
    networks: [db-back]
    environment:
      POSTGRES_DB: joelburigo
      POSTGRES_USER: joelburigo
      POSTGRES_PASSWORD: ${JOELBURIGO_SITE_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - /mnt/data/pg-joelburigo-site:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joelburigo"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Watchtower não puxa patch automático de DB
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

# ============================================================================
# Adicionar ao pgbouncer existente o pool pra novo DB:
#
#   - databases.ini (ou ENV equivalente):
#       joelburigo = host=pg-joelburigo-site port=5432 dbname=joelburigo
#
# Adicionar path ao scripts/backup.sh:
#   BACKUP_PATHS+=("/mnt/data/pg-joelburigo-site")
# ============================================================================
