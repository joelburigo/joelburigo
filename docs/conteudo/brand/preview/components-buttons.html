<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: #050505;
        color: #f5f1e8;
        font-family: 'Archivo', sans-serif;
        display: flex;
        gap: 20px;
        align-items: center;
        flex-wrap: wrap;
      }
      .btn {
        font-family: 'Archivo', sans-serif;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        padding: 12px 18px;
        border: 0;
        cursor: pointer;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 0;
        transition: all 150ms;
      }
      .arr {
        font-family: 'JetBrains Mono', monospace;
      }
      .cta {
        background: #c6ff00;
        color: #050505;
        box-shadow: 4px 4px 0 #ff3b0f;
      }
      .cta:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0 #ff3b0f;
      }
      .btn-fire {
        background: #ff3b0f;
        color: #050505;
        box-shadow: 6px 6px 0 #c6ff00;
        padding: 18px 24px;
        font-size: 14px;
      }
      .btn-fire:hover {
        transform: translate(-2px, -2px);
        box-shadow: 8px 8px 0 #c6ff00;
      }
      .ghost {
        background: transparent;
        color: #f5f1e8;
        border: 1px solid rgba(255, 255, 255, 0.25);
      }
      .ghost:hover {
        border-color: #ff3b0f;
        color: #ff3b0f;
      }
      .dis {
        background: #c6ff00;
        color: #050505;
        opacity: 0.35;
        cursor: not-allowed;
      }
      .tag {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.2em;
        color: #6b7280;
        text-transform: uppercase;
        margin-top: 8px;
        display: block;
        text-align: center;
      }
      .col {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="col">
      <button class="btn cta">Executar diagnóstico <span class="arr">→</span></button
      ><span class="tag">// CTA · ACID + OFFSET FIRE</span>
    </div>
    <div class="col">
      <button class="btn btn-fire">★ Quero o diagnóstico <span class="arr">→</span></button
      ><span class="tag">// BTN-FIRE · CTA GIGANTE</span>
    </div>
    <div class="col">
      <button class="btn ghost">Ver growth_lab</button
      ><span class="tag">// GHOST · SECUNDÁRIO</span>
    </div>
    <div class="col">
      <button class="btn dis">Indisponível</button><span class="tag">// DISABLED</span>
    </div>
  </body>
</html>
