<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:0;background:#050505;color:#F5F1E8;font-family:'Archivo',sans-serif}
 .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid rgba(198,255,0,0.3);border-bottom:1px solid rgba(255,255,255,0.08)}
 .kpi{padding:24px 22px;border-right:1px solid rgba(255,255,255,0.08)}
 .kpi:last-child{border-right:0}
 .v{font-family:'Archivo Black',sans-serif;font-size:48px;line-height:0.95;letter-spacing:-0.04em;color:#F5F1E8}
 .v .u{color:#C6FF00;font-size:28px}
 .l{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;color:#6B7280;text-transform:uppercase;margin-top:8px}
</style></head><body>
<div class="kpis">
  <div class="kpi"><div class="v">17<span class="u">+</span></div><div class="l">/ anos em vendas</div></div>
  <div class="kpi"><div class="v">R$1<span class="u">BI</span></div><div class="l">/ receita gerada</div></div>
  <div class="kpi"><div class="v">140<span class="u">+</span></div><div class="l">/ mpes estruturadas</div></div>
  <div class="kpi"><div class="v">6<span class="u">Ps</span></div><div class="l">/ framework core</div></div>
</div>
</body></html>
