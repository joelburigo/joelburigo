<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:24px;background:#050505;color:#F5F1E8;font-family:'Archivo',sans-serif}
 .ps{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid rgba(255,255,255,0.08)}
 .p{padding:22px 20px 24px;border-right:1px solid rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.08);position:relative;cursor:pointer;transition:background 200ms}
 .p:nth-child(3n){border-right:0}
 .p:nth-last-child(-n+3){border-bottom:0}
 .p:hover{background:rgba(198,255,0,0.03)}
 .p:hover .n{color:#C6FF00;text-shadow:0 0 18px rgba(198,255,0,0.4)}
 .p::before{content:'';position:absolute;top:0;left:0;width:0;height:2px;background:#C6FF00;transition:width 240ms}
 .p:hover::before{width:100%}
 .tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.25em;color:#6B7280;text-transform:uppercase}
 .tag b{color:#FF3B0F}
 .n{font-family:'Archivo Black',sans-serif;font-size:72px;line-height:0.9;letter-spacing:-0.05em;color:rgba(245,241,232,0.12);transition:all 220ms;margin-top:6px}
 .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.28em;color:#FF3B0F;text-transform:uppercase;margin-top:4px}
 .q{font-family:'Archivo Black',sans-serif;font-size:20px;text-transform:uppercase;letter-spacing:-0.02em;margin-top:8px;line-height:0.95}
</style></head><body>
<div class="ps">
  <div class="p"><div class="tag">MÓDULO <b>01</b></div><div class="n">P1</div><div class="k">// POSICIONAMENTO</div><div class="q">Por quê tu?</div></div>
  <div class="p"><div class="tag">MÓDULO <b>02</b></div><div class="n">P2</div><div class="k">// PÚBLICO</div><div class="q">Pra quem?</div></div>
  <div class="p"><div class="tag">MÓDULO <b>03</b></div><div class="n">P3</div><div class="k">// PRODUTO</div><div class="q">O quê?</div></div>
  <div class="p"><div class="tag">MÓDULO <b>04</b></div><div class="n">P4</div><div class="k">// PROGRAMAS</div><div class="q">Como atrair?</div></div>
  <div class="p"><div class="tag">MÓDULO <b>05</b></div><div class="n">P5</div><div class="k">// PROCESSOS</div><div class="q">Como executar?</div></div>
  <div class="p"><div class="tag">MÓDULO <b>06</b></div><div class="n">P6</div><div class="k">// PESSOAS</div><div class="q">Com quem?</div></div>
</div>
</body></html>
