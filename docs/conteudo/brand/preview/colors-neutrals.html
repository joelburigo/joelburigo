<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:20px;background:#050505;color:#F5F1E8;font-family:'Archivo',sans-serif}
 .top{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;color:#6B7280;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between}
 .top b{color:#C6FF00}
 .row{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid rgba(255,255,255,0.08)}
 .s{padding:14px 12px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid rgba(255,255,255,0.08)}
 .s:last-child{border-right:0}
 .v{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;opacity:0.8}
 .n{font-family:'Archivo Black',sans-serif;font-size:12px;letter-spacing:-0.02em}
 .r{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.18em;opacity:0.6}
</style></head><body>
<div class="top"><span>// NEUTRALS · TERMINAL GROWTH</span><span><b>● LIVE</b></span></div>
<div class="row">
  <div class="s" style="background:#050505"><span class="n">INK</span><span><div class="v">#050505</div><div class="r">// BASE</div></span></div>
  <div class="s" style="background:#0B0B0B"><span class="n">INK-2</span><span><div class="v">#0B0B0B</div><div class="r">// CARD</div></span></div>
  <div class="s" style="background:#121212"><span class="n">INK-3</span><span><div class="v">#121212</div><div class="r">// ELEVATED</div></span></div>
  <div class="s" style="background:#6B7280"><span class="n">MUTE</span><span><div class="v">#6B7280</div><div class="r">// MICRO-COPY</div></span></div>
  <div class="s" style="background:#F5F1E8;color:#050505"><span class="n">CREAM</span><span><div class="v" style="color:#555">#F5F1E8</div><div class="r" style="color:#555">// FG</div></span></div>
  <div class="s" style="background:rgba(255,255,255,0.08)"><span class="n">HAIR</span><span><div class="v">#FFF · a=0.08</div><div class="r">// DIVIDER</div></span></div>
</div>
</body></html>
