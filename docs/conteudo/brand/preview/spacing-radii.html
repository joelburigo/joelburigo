<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #050505;
        color: #f5f1e8;
        font-family: 'Archivo', sans-serif;
        display: flex;
        gap: 20px;
        align-items: center;
        flex-wrap: wrap;
      }
      .b {
        background: #0b0b0b;
        border: 1px solid rgba(255, 255, 255, 0.08);
        width: 96px;
        height: 64px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .t {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.15em;
        color: #6b7280;
        text-align: center;
      }
      .n {
        font-family: 'Archivo Black', sans-serif;
        font-size: 10px;
        color: #c6ff00;
      }
      .bad {
        color: #ff3b0f;
      }
      .top {
        width: 100%;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.22em;
        color: #6b7280;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .top b {
        color: #c6ff00;
      }
    </style>
  </head>
  <body>
    <div class="top">// RADII — <b>0 = ASSINATURA</b> · 2PX CHIP RARO · 4PX+ PROIBIDO</div>
    <div class="b" style="border-radius: 0">
      <span class="n">NONE</span><span class="t">0px · default</span>
    </div>
    <div class="b" style="border-radius: 2px">
      <span class="n">SM</span><span class="t">2px · chips raro</span>
    </div>
    <div class="b" style="border-radius: 4px">
      <span class="n bad">MD</span><span class="t">4px · EVITAR</span>
    </div>
    <div class="b" style="border-radius: 8px">
      <span class="n bad">LG</span><span class="t">8px · PROIBIDO</span>
    </div>
    <div class="b" style="border-radius: 9999px">
      <span class="n">PILL</span><span class="t">chips orgânicos</span>
    </div>
  </body>
</html>
