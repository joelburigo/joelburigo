<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:28px;background:#050505;color:#F5F1E8;font-family:'Archivo',sans-serif;display:flex;gap:40px;align-items:center}
 .wm{font-size:56px;letter-spacing:-0.045em;line-height:1;font-family:'Archivo',sans-serif}
 .wm .j{font-family:'Archivo Black',sans-serif;font-weight:900;color:#F5F1E8}
 .wm .b{font-family:'Archivo',sans-serif;font-weight:500;color:#FF3B0F}
 .mark{width:72px;height:72px;background:#FF3B0F;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black',sans-serif;font-size:44px;color:#050505;line-height:1}
 .mark-acid{width:72px;height:72px;background:#C6FF00;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black',sans-serif;font-size:44px;color:#050505;line-height:1}
 .t{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.25em;color:#6B7280;text-transform:uppercase;margin-top:12px;max-width:220px}
</style></head><body>
<div>
  <div class="wm"><span class="j">JOEL</span><span class="b">BURIGO</span></div>
  <div class="t">// WORDMARK · JOEL BLACK CREAM + BURIGO MEDIUM FIRE</div>
</div>
<div>
  <div class="mark">JB</div>
  <div class="t">// MARK FIRE · AVATAR / FAVICON</div>
</div>
<div>
  <div class="mark-acid">JB</div>
  <div class="t">// MARK ACID · VARIANTE GROWTH</div>
</div>
</body></html>
