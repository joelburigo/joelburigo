<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:20px;background:#050505;color:#F5F1E8;font-family:'Archivo',sans-serif}
 .grid-bg{position:fixed;inset:0;pointer-events:none;opacity:0.35;background-image:linear-gradient(to right,rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:80px 80px}
 .wrap{position:relative;display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid rgba(255,255,255,0.08)}
 .s{padding:16px;min-height:140px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid rgba(255,255,255,0.08);position:relative}
 .s:last-child{border-right:0}
 .n{font-family:'Archivo Black';font-size:15px;letter-spacing:-0.02em;line-height:1}
 .h{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;color:#6B7280}
 .r{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.2em;color:#6B7280}
 .top{font-family:'JetBrains Mono';font-size:10px;letter-spacing:0.22em;color:#6B7280;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between}
 .top b{color:#C6FF00}
</style></head><body>
<div class="grid-bg"></div>
<div class="top"><span>// CORE PALETTE · v3 TERMINAL GROWTH</span><span><b>● LIVE</b></span></div>
<div class="wrap">
  <div class="s" style="background:#050505"><span class="n">INK</span><span><div class="h">#050505</div><div class="r">// BASE</div></span></div>
  <div class="s" style="background:#0B0B0B"><span class="n">INK-2</span><span><div class="h">#0B0B0B</div><div class="r">// CARD</div></span></div>
  <div class="s" style="background:#F5F1E8;color:#050505"><span class="n">CREAM</span><span><div class="h" style="color:#6B6B6B">#F5F1E8</div><div class="r" style="color:#6B6B6B">// FG</div></span></div>
  <div class="s" style="background:#FF3B0F;color:#050505"><span class="n">FIRE</span><span><div class="h" style="color:#050505">#FF3B0F</div><div class="r" style="color:#050505">// ALERT · URGÊNCIA</div></span></div>
  <div class="s" style="background:#C6FF00;color:#050505"><span class="n">ACID</span><span><div class="h" style="color:#050505">#C6FF00</div><div class="r" style="color:#050505">// GROWTH · SUCESSO</div></span></div>
</div>
</body></html>
