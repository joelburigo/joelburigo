<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:24px;background:#050505;color:#F5F1E8;font-family:'Archivo',sans-serif}
 .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1px solid rgba(255,255,255,0.08)}
 .s{padding:12px;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;align-items:flex-start;gap:6px;min-height:120px;justify-content:flex-end}
 .s:last-child{border-right:0}
 .box{background:#C6FF00}
 .t{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.15em;color:#6B7280}
 .n{font-family:'Archivo Black',sans-serif;font-size:11px;color:#F5F1E8}
</style></head><body>
<div class="grid">
  <div class="s"><div class="box" style="width:4px;height:4px"></div><span class="n">SP-1</span><span class="t">4px</span></div>
  <div class="s"><div class="box" style="width:8px;height:8px"></div><span class="n">SP-2</span><span class="t">8px</span></div>
  <div class="s"><div class="box" style="width:16px;height:16px"></div><span class="n">SP-4</span><span class="t">16px</span></div>
  <div class="s"><div class="box" style="width:24px;height:24px"></div><span class="n">SP-6</span><span class="t">24px</span></div>
  <div class="s"><div class="box" style="width:32px;height:32px"></div><span class="n">SP-8</span><span class="t">32px</span></div>
  <div class="s"><div class="box" style="width:48px;height:48px"></div><span class="n">SP-12</span><span class="t">48px</span></div>
  <div class="s"><div class="box" style="width:64px;height:64px"></div><span class="n">SP-16</span><span class="t">64px</span></div>
</div>
</body></html>
